<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presupuestador Pro - MP Excel</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary-blue: #3b82f6;
            --success-green: #2ecc71;
            --bg-dark: #1a1a1a;
            --panel-bg: #262626;
            --accent-red: #e74c3c;
            --accent-gold: #f1c40f;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg-dark); 
            color: white; 
            margin: 0; 
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Configuración Inicial */
        #setup { position: fixed; inset: 0; background: var(--bg-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; text-align: center; }
        .setup-card { background: #2d2d2d; padding: 30px; border-radius: 15px; border: 2px solid var(--primary-blue); max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        #main-container { display: none; width: 100%; height: 100%; flex-direction: row; }
        
        /* Panel Izquierdo (Scanner) */
        #scanner-panel { width: 40%; border-right: 2px solid #333; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        #reader { width: 100%; max-width: 350px; margin: 10px 0; border-radius: 10px; overflow: hidden; background: #000; display: none; border: 2px solid var(--primary-blue); }
        
        .search-box { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { font-size: 18px; padding: 12px; border-radius: 10px; border: 2px solid #444; background: #000; color: #fff; text-align: center; width: 100%; box-sizing: border-box; outline: none; }
        input[type="text"]:focus { border-color: var(--primary-blue); }
        
        /* Panel Derecho (Presupuesto) */
        #budget-panel { width: 60%; background: #212121; display: flex; flex-direction: column; padding: 20px; }
        .table-container { flex-grow: 1; overflow-y: auto; border: 1px solid #444; border-radius: 8px; background: #1a1a1a; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #333; color: var(--primary-blue); padding: 12px; position: sticky; top: 0; text-transform: uppercase; font-size: 11px; }
        td { padding: 10px; border-bottom: 1px solid #333; text-align: center; }
        
        .total-budget { font-size: 28px; color: var(--success-green); text-align: right; padding: 15px; background: #000; border-radius: 8px; margin-top: 10px; font-weight: bold; border: 1px solid #333; }
        
        /* Botones */
        .btn { padding: 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; transition: opacity 0.2s; }
        .btn:active { opacity: 0.7; }
        .btn-scan { background: var(--primary-blue); color: white; width: 100%; margin-bottom: 10px; }
        .btn-pdf { background: var(--accent-red); color: white; }
        .btn-reset { background: #444; color: white; }

        /* Adaptación Móvil */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; display: block; }
            #main-container { flex-direction: column; min-height: 100vh; }
            #scanner-panel, #budget-panel { width: 100%; height: auto; border: none; box-sizing: border-box; }
            #reader { max-width: 100%; }
            .total-budget { font-size: 24px; position: sticky; bottom: 0; z-index: 5; }
        }
    </style>
</head>
<body>

    <div id="setup">
        <div class="setup-card">
            <h2 style="color: var(--primary-blue); margin-top: 0;">MP PRESUPUESTADOR</h2>
            <p style="color: #bbb;">Seleccione el archivo Excel de productos para comenzar</p>
            <input type="file" id="excelFileInput" accept=".xlsx, .xls" style="color: #fff; margin-top: 10px;">
        </div>
    </div>

    <div id="main-container">
        <div id="scanner-panel">
            <button class="btn btn-scan" id="btnCamara" onclick="alternarCamara()">📸 ABRIR CÁMARA</button>
            <div id="reader"></div>
            
            <div class="search-box">
                <input type="text" id="codigoInput" placeholder="O INGRESE CÓDIGO MANUAL" autocomplete="off">
            </div>
            
            <div id="resultado" style="width:100%">
                <div id="desc" style="font-size: 22px; font-weight: bold; text-align: center; margin: 10px 0; color: var(--accent-gold); min-height: 30px;">ESPERANDO...</div>
                <div id="peso-display" style="color: #2ecc71; font-weight: bold; font-size: 18px; text-align: center; margin-bottom: 10px;"></div>
            </div>
        </div>

        <div id="budget-panel">
            <h3 style="margin: 0 0 10px 0; color: var(--primary
