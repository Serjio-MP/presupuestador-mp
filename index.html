<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MP - Verificador de Precios</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary-blue: #3b82f6; --bg-dark: #1a1a1a; --accent-gold: #f1c40f; --success-green: #2ecc71; }
        body { font-family: sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 0; overflow: hidden; }
        
        #setup { position: fixed; inset: 0; background: var(--bg-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; text-align: center; }
        .setup-card { background: #2d2d2d; padding: 30px; border-radius: 15px; border: 2px solid var(--primary-blue); max-width: 90%; }
        
        #main-container { display: none; flex-direction: column; height: 100vh; padding: 15px; box-sizing: border-box; }
        
        #reader { width: 100%; max-width: 400px; margin: 0 auto; border: 2px solid var(--primary-blue); border-radius: 10px; overflow: hidden; display: none; }
        
        .display-card { 
            background: #262626; 
            border-radius: 15px; 
            padding: 25px; 
            margin-top: 20px; 
            text-align: center; 
            border: 1px solid #444;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .producto-nombre { color: var(--accent-gold); font-size: 26px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        .precio-label { color: #aaa; font-size: 16px; margin-top: 15px; text-transform: uppercase; }
        .precio-valor { color: var(--success-green); font-size: 48px; font-weight: bold; margin: 5px 0; }
        .precio-bulto { color: #3b82f6; font-size: 32px; font-weight: bold; }

        .btn { width: 100%; padding: 18px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; }
        .btn-scan { background: var(--primary-blue); color: white; margin-bottom: 15px; }
        .btn-update { background: #333; color: #888; font-size: 12px; margin-top: 20px; }
        
        input[type="text"] { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

    <div id="setup">
        <div class="setup-card">
            <h2 style="color: var(--primary-blue);">CONSULTA DE PRECIOS MP</h2>
            <p>Cargue el Excel para inicializar la base</p>
            <input type="file" id="excelFileInput" accept=".xlsx, .xls">
        </div>
    </div>

    <div id="main-container">
        <button class="btn btn-scan" id="btnCamara" onclick="alternarCamara()">📸 ACTIVAR ESCÁNER</button>
        <div id="reader"></div>
        
        <input type="text" id="codigoInput" placeholder="O DIGITE CÓDIGO MANUAL" style="margin-top: 15px;">

        <div class="display-card" id="display">
            <div id="desc" class="producto-nombre">ESCANEÉ UN PRODUCTO</div>
            
            <div id="info-precios" style="display: none;">
                <div class="precio-label">Precio Unitario / KG</div>
                <div id="unitario" class="precio-valor">$ 0.00</div>
                
                <div class="precio-label">Precio por Bulto</div>
                <div id="bulto" class="precio-bulto">$ 0.00</div>
            </div>
        </div>

        <button class="btn btn-update" onclick="actualizarBase()">ACTUALIZAR EXCEL DE PRECIOS</button>
    </div>

    <script>
        let productosCortos = new Map();
        let productosLargos = new Map();
        let html5QrCode = null;
        let lastReadCode = "";
        let lastReadTime = 0;

        window.onload = () => {
            const stored = localStorage.getItem('mp_verificador_data');
            if (stored) {
                const data = JSON.parse(stored);
                productosCortos = new Map(Object.entries(data.cortos));
                productosLargos = new Map(Object.entries(data.largos));
                document.getElementById('setup').style.display = 'none';
                document.getElementById('main-container').style.display = 'flex';
            }
        };

        function actualizarBase() {
            if(confirm("¿Desea cargar una nueva lista?")) {
                localStorage.removeItem('mp_verificador_data');
                location.reload();
            }
        }

        document.getElementById('excelFileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const filas = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                
                let cortosObj = {}; let largosObj = {};

                filas.forEach((f, i) => {
                    if (i === 0 || !f[2]) return;
                    // f[2]: nombre, f[5]: precio unit, f[4]: precio bulto
                    const d = { 
                        n: String(f[2]), 
                        u: parseFloat(f[5])||0, 
                        b: parseFloat(f[4])||0 
                    };
                    if (f[0]) cortosObj[String(f[0]).trim()] = d;
                    if (f[1]) largosObj[String(f[1]).trim()] = d;
                });

                localStorage.setItem('mp_verificador_data', JSON.stringify({ cortos: cortosObj, largos: largosObj }));
                location.reload();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        async function alternarCamara() {
            const readerDiv = document.getElementById('reader');
            const btn = document.getElementById('btnCamara');
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
                html5QrCode = null;
                readerDiv.style.display = 'none';
                btn.innerText = "📸 ACTIVAR ESCÁNER";
                return;
            }
            readerDiv.style.display = 'block';
            btn.innerText = "🛑 DETENER ESCÁNER";
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                const now = Date.now();
                if (text === lastReadCode && (now - lastReadTime) < 2000) return;
                lastReadCode = text; lastReadTime = now;
                mostrarPrecio(text);
                if(navigator.vibrate) navigator.vibrate(50);
            });
        }

        function mostrarPrecio(cod) {
            let p = cod.length >= 6 ? productosLargos.get(cod) : productosCortos.get(cod);
            
            // Lógica para etiquetas de balanza (si el código no está directo)
            if (!p && cod.length >= 12) {
                const idC = cod.substring(1, 7).replace(/^0+/, '');
                p = productosCortos.get(idC);
            }

            const infoDiv = document.getElementById('info-precios');
            const desc = document.getElementById('desc');

            if (p) {
                desc.innerText = p.n;
                document.getElementById('unitario').innerText = `$ ${p.u.toLocaleString('es-AR', {minimumFractionDigits:2})}`;
                document.getElementById('bulto').innerText = `$ ${p.b.toLocaleString('es-AR', {minimumFractionDigits:2})}`;
                infoDiv.style.display = 'block';
            } else {
                desc.innerText = "PRODUCTO NO ENCONTRADO";
                infoDiv.style.display = 'none';
            }
        }

        document.getElementById('codigoInput').addEventListener('change', (e) => {
            mostrarPrecio(e.target.value);
            e.target.value = "";
        });
    </script>
</body>
</html>
